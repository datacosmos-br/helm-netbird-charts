apiVersion: v1
kind: Service
metadata:
  name: {{ include "netbird.fullname" . }}-relay
  labels:
    {{- include "netbird.relay.labels" . | nindent 4 }}
spec:
  type: {{ .Values.relay.service.type }}
  ports:
    # targetPort: websocket — o relay-deployment expõe as portas nomeadas
    # `quic` (UDP), `websocket` (TCP) e `metrics` (TCP). NÃO existe porta
    # `http`: apontar targetPort para ela tornava este Service não-funcional.
    - port: {{ .Values.relay.service.port }}
      targetPort: websocket
      protocol: TCP
      name: websocket
    - port: {{ .Values.relay.metrics.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "netbird.relay.selectorLabels" . | nindent 4 }}
