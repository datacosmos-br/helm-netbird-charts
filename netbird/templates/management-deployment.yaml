apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netbird.fullname" . }}-management
  {{- with .Values.management.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "netbird.management.labels" . | nindent 4 }}
spec:
  {{- if not .Values.management.autoscaling.enabled }}
  replicas: {{ .Values.management.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "netbird.management.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print .Template.BasePath "/management-cm.yaml") . | sha256sum }}
        {{- with .Values.management.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "netbird.management.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.management.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "netbird.management.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.management.podSecurityContext | nindent 8 }}
      initContainers:
        # Renders management.json from the templated ConfigMap, interpolating
        # secrets (relay / IdP / PKCE) from env so they never land in a ConfigMap.
        - name: render-config
          image: "{{ .Values.management.config.image }}"
          imagePullPolicy: {{ .Values.management.config.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - envsubst < /tmp/netbird/management.tmpl.json > /etc/netbird/management.json
          env:
            # STUN / TURN
            - name: NETBIRD_STUN_URI
              value: {{ .Values.stun.uri | quote }}
            - name: NETBIRD_TURN_URI
              value: {{ .Values.turn.uri | default "" | quote }}
            - name: NETBIRD_TURN_USER
              value: {{ .Values.turn.user | default "" | quote }}
            - name: NETBIRD_TURN_PASSWORD
              {{- if .Values.turn.secretKeyRef }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.turn.secretKeyRef.name }}
                  key: {{ .Values.turn.secretKeyRef.key }}
              {{- else }}
              value: ""
              {{- end }}
            # Relay
            - name: NETBIRD_RELAY_ENDPOINT
              value: "{{ .Values.relay.domainName }}:{{ .Values.relay.service.port }}"
            - name: NETBIRD_RELAY_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.relay.auth.secret.name }}
                  key: {{ .Values.relay.auth.secret.key }}
            # Signal
            - name: NETBIRD_SIGNAL_PROTOCOL
              value: {{ .Values.signal.protocol | quote }}
            - name: NETBIRD_SIGNAL_URI
              value: {{ .Values.signal.uri | quote }}
            # Data store
            - name: NETBIRD_STORE_CONFIG_ENGINE
              value: "{{ if .Values.management.database.postgres }}postgres{{ else }}sqlite{{ end }}"
            - name: NETBIRD_DATASTORE_ENC_KEY
              {{- if .Values.management.dataStoreEncryptionKeySecretRef }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.management.dataStoreEncryptionKeySecretRef.name }}
                  key: {{ .Values.management.dataStoreEncryptionKeySecretRef.key }}
              {{- else }}
              value: {{ .Values.management.dataStoreEncryptionKey | default "" | quote }}
              {{- end }}
            # Management HTTP API
            - name: NETBIRD_MGMT_API_PORT
              value: "{{ .Values.management.service.port }}"
            - name: NETBIRD_MGMT_API_CERT_FILE
              value: ""
            - name: NETBIRD_MGMT_API_CERT_KEY_FILE
              value: ""
            - name: NETBIRD_MGMT_DISABLE_DEFAULT_POLICY
              value: "{{ .Values.management.disableDefaultPolicy }}"
            - name: NETBIRD_MGMT_IDP_SIGNKEY_REFRESH
              value: "{{ .Values.management.idpSignKeyRefreshEnabled }}"
            # OIDC token validation
            - name: NETBIRD_AUTH_AUDIENCE
              value: {{ .Values.auth.audience | quote }}
            - name: NETBIRD_AUTH_AUTHORITY
              value: {{ .Values.auth.authority | quote }}
            - name: NETBIRD_AUTH_USER_ID_CLAIM
              value: {{ .Values.auth.userIDClaim | default "sub" | quote }}
            - name: NETBIRD_AUTH_JWT_CERTS
              value: {{ .Values.auth.jwtKeysLocation | default "" | quote }}
            - name: NETBIRD_AUTH_OIDC_CONFIGURATION_ENDPOINT
              value: "{{ .Values.auth.authority }}/.well-known/openid-configuration"
            - name: NETBIRD_AUTH_TOKEN_ENDPOINT
              value: {{ .Values.idp.tokenEndpoint | default "" | quote }}
            # IdP manager
            - name: NETBIRD_MGMT_IDP
              value: {{ .Values.idp.managerType | quote }}
            - name: NETBIRD_IDP_MGMT_CLIENT_ID
              value: {{ .Values.idp.clientID | default "" | quote }}
            - name: NETBIRD_IDP_MGMT_CLIENT_SECRET
              {{- if .Values.idp.secretKeyRef }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.idp.secretKeyRef.name }}
                  key: {{ .Values.idp.secretKeyRef.key }}
              {{- else }}
              value: {{ .Values.idp.clientSecret | default "" | quote }}
              {{- end }}
            # NetBird builds the IdP manager from ClientConfig + ExtraConfig
            # (idp.go NewManager). ExtraConfig carries provider-specific keys;
            # for Keycloak the AdminEndpoint is injected from idp.adminEndpoint.
            - name: NETBIRD_IDP_MGMT_EXTRA_CONFIG
              value: {{ include "netbird.idpExtraConfig" . | quote }}
            # Device authorization flow (CLI clients)
            - name: NETBIRD_AUTH_DEVICE_AUTH_PROVIDER
              value: {{ .Values.auth.device.provider | default "none" | quote }}
            - name: NETBIRD_AUTH_DEVICE_AUTH_AUDIENCE
              value: {{ .Values.auth.device.audience | default "" | quote }}
            - name: NETBIRD_AUTH0_DOMAIN
              value: {{ .Values.auth.device.authority | default "" | quote }}
            - name: NETBIRD_AUTH_DEVICE_AUTH_CLIENT_ID
              value: {{ .Values.auth.device.clientID | default "" | quote }}
            - name: NETBIRD_AUTH_DEVICE_AUTH_ENDPOINT
              value: {{ .Values.auth.device.deviceAuthorizationEndpoint | default "" | quote }}
            - name: NETBIRD_AUTH_DEVICE_AUTH_SCOPE
              value: {{ .Values.auth.device.scope | default "openid" | quote }}
            - name: NETBIRD_AUTH_DEVICE_AUTH_USE_ID_TOKEN
              value: "{{ .Values.auth.device.useIDToken | default false }}"
            # PKCE authorization flow (browser clients)
            - name: NETBIRD_AUTH_PKCE_AUDIENCE
              value: {{ .Values.auth.pkce.audience | default .Values.auth.audience | quote }}
            - name: NETBIRD_AUTH_CLIENT_ID
              value: {{ .Values.auth.pkce.clientID | default "" | quote }}
            - name: NETBIRD_AUTH_CLIENT_SECRET
              {{- if .Values.auth.pkce.secretKeyRef }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.pkce.secretKeyRef.name }}
                  key: {{ .Values.auth.pkce.secretKeyRef.key }}
              {{- else }}
              value: {{ .Values.auth.pkce.clientSecret | default "" | quote }}
              {{- end }}
            - name: NETBIRD_AUTH_PKCE_AUTHORIZATION_ENDPOINT
              value: {{ .Values.auth.pkce.authorizationEndpoint | default "" | quote }}
            - name: NETBIRD_AUTH_SUPPORTED_SCOPES
              value: {{ .Values.auth.pkce.supportedScopes | default "openid profile email" | quote }}
            - name: NETBIRD_AUTH_PKCE_REDIRECT_URLS
              value: {{ include "netbird.pkceRedirectURLs" . | quote }}
            - name: NETBIRD_AUTH_PKCE_USE_ID_TOKEN
              value: "{{ .Values.auth.pkce.useIDToken | default false }}"
            - name: NETBIRD_AUTH_PKCE_DISABLE_PROMPT_LOGIN
              value: "{{ .Values.auth.pkce.disablePromptLogin | default false }}"
            - name: NETBIRD_AUTH_PKCE_LOGIN_FLAG
              value: "{{ .Values.auth.pkce.loginFlag | default 0 }}"
          volumeMounts:
            - mountPath: /etc/netbird
              name: config
            - mountPath: /tmp/netbird
              name: config-template
      containers:
        - name: {{ .Chart.Name }}-management
          securityContext:
            {{- toYaml .Values.management.securityContext | nindent 12 }}
          image: "{{ .Values.management.image.repository }}:{{ .Values.management.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.management.image.pullPolicy }}
          args:
            - --log-level
            - {{ .Values.management.logLevel }}
            - --log-file
            - console
            - --dns-domain
            - {{ .Values.management.dnsDomain }}
          {{- if .Values.management.database.postgres }}
          env:
            - name: NETBIRD_STORE_ENGINE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.management.database.postgres.dsnSecret.name }}
                  key: {{ .Values.management.database.postgres.dsnSecret.key }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.management.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            {{- toYaml .Values.management.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /etc/netbird
              name: config
            - mountPath: /var/lib/netbird
              name: management
      {{- with .Values.management.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.management.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.management.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          emptyDir:
            medium: Memory
        - name: config-template
          configMap:
            name: {{ include "netbird.fullname" . }}-management
        - name: management
          {{- if .Values.management.persistentVolume.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "netbird.fullname" . }}-management
          {{- else }}
          emptyDir: {}
          {{- end }}
