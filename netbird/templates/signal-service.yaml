apiVersion: v1
kind: Service
metadata:
  name: {{ include "netbird.fullname" . }}-signal
  labels:
    {{- include "netbird.signal.labels" . | nindent 4 }}
  {{- /* Signal is gRPC-only; serversscheme=h2c belongs on the Service so      */}}
  {{- /* Traefik speaks HTTP/2 cleartext to the SignalExchange backend.        */}}
  {{- with .Values.annotations.grpc }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.signal.service.type }}
  ports:
    - port: {{ .Values.signal.service.port }}
      targetPort: {{ .Values.signal.protocol }}
      protocol: TCP
      name: {{ .Values.signal.protocol }}
    - port: {{ .Values.signal.metrics.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "netbird.signal.selectorLabels" . | nindent 4 }}
